# Despliegue de la SPA en push a main (o sea, al mergear). La validacion en PR vive en ci.yml. Ver
# docs/despliegue.md del repo cgc-backend.
#
# Desplegar el front es copiar ficheros a /srv/cgc/www, donde Caddy los sirve. No se construye
# ninguna imagen y no se reinicia ningun contenedor: nadie pierde la sesion.
name: deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-frontend
  cancel-in-progress: false

jobs:
  deploy:
    # Solo corre sobre main (ya revisado), asi que el runner self-hosted del mini PC es seguro: aqui
    # nunca se ejecuta codigo de un PR sin revisar (eso se queda en ci.yml, en runners de GitHub).
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci

      # Antes del build a proposito: si los tests fallan, no se construye nada y por tanto no hay nada
      # que publicar. Ese es el freno. --watch=false para que vitest no cuelgue el job.
      - name: Tests
        run: npx ng test --watch=false

      # "production" es la defaultConfiguration del proyecto: es la que aplica el fileReplacements de
      # environment.prod.ts. Sin ella, la SPA saldria apuntando a localhost:8080 y no habria login.
      - run: npx ng build --configuration production

      - name: Publicar en /srv/cgc/www
        run: |
          # El directorio lo crea el deploy del backend antes de levantar el compose, y a
          # proposito: si no existe al montar el bind mount, lo crea el demonio de Docker
          # como ROOT y este rsync se come un "Permission denied" (ver despliegue.md).
          mkdir -p /srv/cgc/www

          # rsync SIN --delete, y a proposito. Los chunks de Angular llevan el hash del
          # contenido en el nombre, asi que publicar la version nueva solo AÑADE ficheros:
          # nunca pisa uno que un navegador ya abierto aun pueda pedir. Si borraramos aqui
          # los assets viejos, un usuario con el index.html anterior en memoria pediria un
          # chunk que acabamos de borrar -> 404 al navegar a una vista aun no cargada, y se
          # le rompe la app (era el bug intermitente de "me echa al login"). rsync sobre el
          # MISMO directorio, nunca un "mv": Caddy lo tiene montado como bind mount, y
          # reemplazar el directorio lo dejaria sirviendo el inodo viejo, ya desenlazado.
          rsync -a dist/cgc-frontend/browser/ /srv/cgc/www/

          # Recogida de basura. Sin --delete el disco creceria sin fin, asi que barremos los
          # assets huerfanos por antiguedad: rsync refresca el mtime de TODO lo que sigue en
          # el build (el index.html y los chunks vigentes se re-tocan en cada deploy), asi
          # que solo los que dejaron de formar parte de la version actual conservan un mtime
          # viejo. 7 dias de gracia -- de sobra para que cualquiera refresque la pestaña.
          find /srv/cgc/www -type f -mtime +7 -delete
          find /srv/cgc/www -type d -empty -delete
